[env]
# LLVM/libclang 路径，指向项目本地安装的 LLVM。
LIBCLANG_PATH = { value = ".llvm/bin", relative = true }

# CMake 路径，指向项目本地安装的 CMake。
CMAKE = { value = ".cmake/bin/cmake.exe", relative = true }

# VS 2026 Build Tools 会让 cmake-rs 推断出当前 CMake 不支持的
# "Visual Studio 18 2026" 生成器，因此这里显式退回 Ninja。
CMAKE_GENERATOR = "Ninja"
CMAKE_MAKE_PROGRAM = { value = ".ninja/ninja.exe", relative = true }

# whisper-rs-sys 的 build.rs 只会把 OUT_DIR 根目录加入安装产物搜索路径；
# 显式把 CMake 安装库目录也落到 OUT_DIR 根，避免静态库被装进 out/lib 后找不到。
CMAKE_INSTALL_LIBDIR = "."

# upstream whisper-rs-sys 会递归加入 OUT_DIR/build/**，而当前 Windows + Ninja
# 实际把 whisper.lib 产在 OUT_DIR/build 根目录。把静态库统一导向 build/Release，
# 让裸 cargo build 也能直接命中它已经添加的 -L .../out/build/Release。
CMAKE_ARCHIVE_OUTPUT_DIRECTORY = "Release"
CMAKE_LIBRARY_OUTPUT_DIRECTORY = "Release"
CMAKE_ARCHIVE_OUTPUT_DIRECTORY_RELEASE = "Release"
CMAKE_LIBRARY_OUTPUT_DIRECTORY_RELEASE = "Release"
CMAKE_ARCHIVE_OUTPUT_DIRECTORY_RELWITHDEBINFO = "Release"
CMAKE_LIBRARY_OUTPUT_DIRECTORY_RELWITHDEBINFO = "Release"

# 继续显式对齐到 Rust 默认的动态 MSVC CRT (/MD, /MDd)。
CMAKE_POLICY_DEFAULT_CMP0091 = "NEW"
CMAKE_MSVC_RUNTIME_LIBRARY = "MultiThreaded$<$<CONFIG:Debug>:Debug>DLL"
